function toFirestoreFormat(state) {
  const roster = {};
  Object.entries(state.roster || {}).forEach(([player, sections]) => {
    roster[player] = {
      treasures: {
        active: (sections.treasures?.active || []).map(([team, swap]) => ({ team, swap })),
        locked: (sections.treasures?.locked || []).map(([team, w, l, period]) => ({ team, w, l, period }))
      },
      trash: {
        active: (sections.trash?.active || []).map(([team, swap]) => ({ team, swap })),
        locked: (sections.trash?.locked || []).map(([team, w, l, period]) => ({ team, w, l, period }))
      }
    };
  });
  return { ...state, roster };
}

function fromFirestoreFormat(state) {
  const roster = {};
  Object.entries(state.roster || {}).forEach(([player, sections]) => {
    roster[player] = {
      treasures: {
        active: (sections.treasures?.active || []).map(({team, swap}) => [team, swap]),
        locked: (sections.treasures?.locked || []).map(({team, w, l, period}) => [team, w, l, period])
      },
      trash: {
        active: (sections.trash?.active || []).map(({team, swap}) => [team, swap]),
        locked: (sections.trash?.locked || []).map(({team, w, l, period}) => [team, w, l, period])
      }
    };
  });
  return { ...state, roster };
}

async function fsLoad(leagueId) {
  try {
    const doc = await db.collection("leagues").doc(leagueId).get();
    return doc.exists ? fromFirestoreFormat(doc.data()) : null;
  } catch(e) { console.warn("Firestore load:", e); return null; }
}

async function fsSave(leagueId, st) {
  try { await db.collection("leagues").doc(leagueId).set(toFirestoreFormat(st)); }
  catch(e) { console.warn("Firestore save:", e); throw e; }
}

function fsSubscribe(leagueId, onData) {
  return db.collection("leagues").doc(leagueId).onSnapshot(
    doc => { if (doc.exists) onData(fromFirestoreFormat(doc.data())); },
    err => console.warn("Firestore subscription:", err)
  );
}

// The leagues collection is the single source of truth for which leagues exist.
// Lists every league for the home screen so any visitor sees them all.
async function fsLoadLeagueList() {
  const snap = await db.collection("leagues").get();
  return snap.docs.map(d => {
    const data = d.data() || {};
    return { id: d.id, name: data.name || "Untitled league", players: data.players || [], createdAt: data.createdAt || 0 };
  }).sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
}

async function fetchWeekScores(season, week) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?seasontype=2&week=${week}&dates=${season}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`ESPN ${res.status}`);
  const data = await res.json();
  const deltas = {};
  for (const event of (data.events || [])) {
    const comp = event.competitions?.[0];
    if (!comp?.status?.type?.completed) continue;
    for (const c of (comp.competitors || [])) {
      const name = c.team?.displayName;
      if (!name) continue;
      if (!deltas[name]) deltas[name] = [0, 0];
      if (c.winner) deltas[name][0]++;
      else          deltas[name][1]++;
    }
  }
  return deltas;
}

async function fetchTeamData(season = ESPN_SEASON) {
  const url = `https://site.api.espn.com/apis/v2/sports/football/nfl/standings?season=${season}&seasontype=2`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`ESPN ${res.status}`);
  const data = await res.json();
  const all = [];
  for (const conf of (data.children || [])) {
    for (const entry of (conf.standings?.entries || [])) {
      const name = entry.team?.displayName;
      if (!name) continue;
      const s = Object.fromEntries((entry.stats || []).map(x => [x.name, x.value]));
      all.push({ name, w: s.wins ?? 0, l: s.losses ?? 0, pct: s.winPercent ?? 0 });
    }
  }
  all.sort((a, b) => b.pct - a.pct || b.w - a.w);
  const result = {};
  all.forEach((t, i) => { result[t.name] = { w: t.w, l: t.l, pct: t.pct, rank: i + 1 }; });
  return result;
}

// ---- Scoring ----
const activePts  = (team, label, records) => { const r = records[team] || [0,0]; return label === "treasure" ? r[0] : r[1]; };
const lockedPts  = (label, w, l) => label === "treasure" ? w : l;
function sectionScore(section, label, records) {
  let s = 0;
  section.active.forEach(([t]) => s += activePts(t, label, records));
  section.locked.forEach(([,w,l]) => s += lockedPts(label, w, l));
  return s;
}
const winnersScore = (player, st) => sectionScore(st.roster[player].treasures, "treasure", st.records);
const losersScore  = (player, st) => sectionScore(st.roster[player].trash, "trash", st.records);
const totalScore   = (player, st) => winnersScore(player, st) + losersScore(player, st);

// ---- Snake draft ----
const ROUNDS  = 8;
const PER_CAT = 4;

function snakePlayer(order, pickIndex) {
  const round = Math.floor(pickIndex / order.length);
  const slot  = pickIndex % order.length;
  const ro    = round % 2 === 0 ? order : order.slice().reverse();
  return ro[slot];
}
function buildStateFromPicks(picks, players) {
  const records = {};
  const roster  = {};
  players.forEach(p => roster[p] = { treasures: { active:[], locked:[] }, trash: { active:[], locked:[] } });
  picks.forEach(({ player, team, type }) => {
    records[team] = [0, 0];
    roster[player][type === "treasure" ? "treasures" : "trash"].active.push([team, null]);
  });
  return { players, records, roster };
}
function loadDraft(leagueId) {
  try { const r = localStorage.getItem(draftKey(leagueId)); if (r) { const p = JSON.parse(r); if (p && Array.isArray(p.order) && Array.isArray(p.picks)) return p; } } catch(e) {}
  return null;
}

function exportLeagueData(leagueId, leagueName) {
  const state = loadLocalState(leagueId);
  if (!state) { alert("No data found for this league"); return; }
  const backup = { leagueId, leagueName, exportedAt: new Date().toISOString(), state };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `trash-treasures-${leagueName.replace(/\s+/g, '-')}-${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importLeagueData(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const backup = JSON.parse(e.target.result);
        if (!backup.leagueId || !backup.state || !backup.state.records || !backup.state.roster) {
          throw new Error("Invalid backup file format");
        }
        resolve(backup);
      } catch(err) { reject(err); }
    };
    reader.onerror = () => reject(new Error("Failed to read file"));
    reader.readAsText(file);
  });
}

// ========== Replay helpers ==========

// Returns a reconstructed roster as it would have been at `replayWeek`.
// Undoes swap windows that hadn't happened yet by reversing the markers.
function getReplayRoster(roster, replayWeek, players) {
  const r = JSON.parse(JSON.stringify(roster));
  const windows = [
    { marker: "wk12", period: "Weeks 7-12", activeAfter: 12 },
    { marker: "wk6",  period: "Weeks 1-6",  activeAfter: 6  },
  ];
  for (const { marker, period, activeAfter } of windows) {
    if (replayWeek > activeAfter) continue; // swap already happened, keep it
    for (const player of players) {
      const pr = r[player];
      if (!pr) continue;
      // Teams swapped INTO treasures via this marker → send back to trash
      const backToTrash     = pr.treasures.active.filter(([,s]) => s === marker).map(([t]) => t);
      // Teams swapped INTO trash via this marker → send back to treasures
      const backToTreasures = pr.trash.active.filter(([,s]) => s === marker).map(([t]) => t);
      pr.treasures.active = pr.treasures.active.filter(([,s]) => s !== marker);
      pr.trash.active     = pr.trash.active.filter(([,s]) => s !== marker);
      backToTrash.forEach(t => pr.trash.active.push([t, null]));
      backToTreasures.forEach(t => pr.treasures.active.push([t, null]));
      // Remove banked records for this period — they hadn't been locked yet
      pr.treasures.locked = pr.treasures.locked.filter(([,,,p]) => p !== period);
      pr.trash.locked     = pr.trash.locked.filter(([,,,p]) => p !== period);
    }
  }
  return r;
}

// Returns adjusted records: subtracts each team's banked periods from the
// cumulative ESPN totals so only the CURRENT period's performance is shown.
function computeAdjustedRecords(replayRecords, replayRoster, players) {
  const bank = {};
  for (const player of players) {
    const pr = replayRoster[player];
    if (!pr) continue;
    for (const [team, w, l] of [...pr.treasures.locked, ...pr.trash.locked]) {
      if (!bank[team]) bank[team] = [0, 0];
      bank[team][0] += w;
      bank[team][1] += l;
    }
  }
  const adjusted = {};
  for (const [team, [w, l]] of Object.entries(replayRecords)) {
    const b = bank[team];
    adjusted[team] = b ? [Math.max(0, w - b[0]), Math.max(0, l - b[1])] : [w, l];
  }
  return adjusted;
}

// Sum ESPN per-week results into each swap window's real record:
//   { "Weeks 1-6": {team:[w,l]}, "Weeks 7-12": {team:[w,l]} }
// These windows are always complete by the time a locked row exists, so the
// results are immutable and a caller can cache them for the session.
async function fetchWindowRecords(season) {
  const ranges = { "Weeks 1-6": [1, 6], "Weeks 7-12": [7, 12] };
  const out = { "Weeks 1-6": {}, "Weeks 7-12": {} };
  for (const [period, [a, b]] of Object.entries(ranges)) {
    for (let w = a; w <= b; w++) {
      const deltas = await fetchWeekScores(season, w);
      for (const [team, [wins, losses]] of Object.entries(deltas)) {
        if (!out[period][team]) out[period][team] = [0, 0];
        out[period][team][0] += wins;
        out[period][team][1] += losses;
      }
    }
  }
  return out;
}

// Full ESPN sync: regenerate banked (locked) values from each team's real
// window performance, and active records as cumulative minus those windows.
// Returns { roster, records, windows } — or null if the season has no
// completed games yet (callers treat null as "don't overwrite"). Pass a
// cached `windows` to skip the per-week refetch.
async function computeEspnSync(season, roster, players, windowsCache) {
  const data = await fetchTeamData(season);
  const cumulative = {};
  Object.entries(data).forEach(([team, d]) => { cumulative[team] = [d.w || 0, d.l || 0]; });
  const games = Object.values(cumulative).reduce((a, [w, l]) => a + w + l, 0);
  if (!Object.keys(cumulative).length || games === 0) return null;

  const windows = windowsCache || await fetchWindowRecords(season);
  const newRoster = JSON.parse(JSON.stringify(roster));
  for (const p of players) {
    const pr = newRoster[p];
    if (!pr) continue;
    for (const sec of ["treasures", "trash"]) {
      pr[sec].locked = (pr[sec].locked || []).map(([team, w, l, period]) => {
        const rec = windows[period] && windows[period][team];
        return rec ? [team, rec[0], rec[1], period] : [team, w, l, period];
      });
    }
  }
  const records = computeAdjustedRecords(cumulative, newRoster, players);
  return { roster: newRoster, records, windows };
}

// ========== League Home ==========
function LeagueHome() {
  const [leagues, setLeagues] = useState(loadLeagues); // localStorage cache → instant paint
  const [loadingList, setLoadingList] = useState(true);
  const [creating, setCreating] = useState(false);
  const [newName, setNewName] = useState("");
  const [newPlayers, setNewPlayers] = useState(["","","",""]);
  const [copied, setCopied] = useState(null);
  const [importing, setImporting] = useState(false);
  const importFileRef = useRef(null);

  // Auth — only the admin can create/delete; everyone else just browses.
  const [authUser, setAuthUser] = useState(() => auth.currentUser);
  useEffect(() => auth.onAuthStateChanged(setAuthUser), []);
  const isAdmin = !!authUser && (ADMIN_CONFIGURED ? authUser.uid === ADMIN_UID : true);
  function signIn()  { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert("Sign-in failed: " + e.message)); }
  function signOut() { auth.signOut(); }

  // The leagues collection in Firestore is the source of truth for the list.
  useEffect(() => {
    fsLoadLeagueList()
      .then(list => { setLeagues(list); saveLeagues(list); })
      .catch(() => {})
      .finally(() => setLoadingList(false));
  }, []);

  const hasLegacy = isAdmin && !!localStorage.getItem(LEGACY_KEY) && !leagues.some(l => l.legacy);

  async function create() {
    const name    = newName.trim();
    const players = newPlayers.map(p => p.trim()).filter(Boolean);
    if (!name || players.length !== 4) return;
    const id      = genId();
    const createdAt = Date.now();
    const entry   = { id, name, players, createdAt };
    const st      = { ...emptyState(players), name, createdAt }; // name/createdAt live in the league doc
    const updated = [...leagues, entry];
    saveLeagues(updated);
    saveLocalState(id, st);
    await fsSave(id, st).catch(() => {});
    window.location.href = `?league=${id}&admin=1`;
  }

  async function importLegacy() {
    try {
      const raw = localStorage.getItem(LEGACY_KEY);
      const st  = JSON.parse(raw);
      if (!st.records || !st.roster) return;
      const players = Object.keys(st.roster);
      const id      = genId();
      const createdAt = Date.now();
      const stWithPlayers = { ...st, players, name: "Trash & Treasures 2024", createdAt };
      const entry   = { id, name: "Trash & Treasures 2024", players, createdAt, legacy: true };
      const updated = [...leagues, entry];
      saveLeagues(updated);
      saveLocalState(id, stWithPlayers);
      await fsSave(id, stWithPlayers).catch(() => {});
      window.location.href = `?league=${id}&admin=1`;
    } catch(e) { alert("Import failed: " + e.message); }
  }

  function copyViewerLink(id) {
    const url = `${window.location.origin}${window.location.pathname}?league=${id}`;
    navigator.clipboard.writeText(url).then(() => { setCopied(id); setTimeout(() => setCopied(null), 2000); });
  }

  async function renameLeague(id, currentName) {
    const input = prompt("Rename league:", currentName);
    if (input == null) return;
    const name = input.trim();
    if (!name || name === currentName) return;
    try {
      await db.collection("leagues").doc(id).update({ name }); // updates only the name field
      const updated = leagues.map(l => l.id === id ? { ...l, name } : l);
      setLeagues(updated);
      saveLeagues(updated);
    } catch(e) { alert("Rename failed: " + (e.message || e)); }
  }

  function deleteLeague(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    localStorage.removeItem(leagueKey(id));
    localStorage.removeItem(draftKey(id));
    db.collection("leagues").doc(id).delete().catch(() => {});
    const updated = leagues.filter(l => l.id !== id);
    saveLeagues(updated);
    setLeagues(updated);
  }

  async function handleImport(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    try {
      setImporting(true);
      const backup = await importLeagueData(file);
      const { leagueId, leagueName, state } = backup;
      const existing = leagues.find(l => l.id === leagueId);
      if (existing && !confirm(`League "${leagueName}" already exists. Overwrite it?`)) { setImporting(false); return; }
      const createdAt = state.createdAt || Date.now();
      const stToSave = { ...state, name: leagueName, createdAt };
      const entry = { id: leagueId, name: leagueName, players: state.players || [], createdAt };
      const updated = existing ? leagues.map(l => l.id === leagueId ? entry : l) : [...leagues, entry];
      saveLeagues(updated);
      saveLocalState(leagueId, stToSave);
      await fsSave(leagueId, stToSave).catch(() => {});
      setLeagues(updated);
      alert(`✓ Restored "${leagueName}"`);
    } catch(err) {
      alert("Import failed: " + (err.message || err));
    } finally {
      setImporting(false);
      if (importFileRef.current) importFileRef.current.value = "";
    }
  }

  return (
    <div>
      <div className="row between" style={{ marginBottom: 28, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h1>🗑️ Trash &amp; 💎 Treasures</h1>
          <div className="sub">{isAdmin ? "Manage leagues" : "Browse leagues"}{loadingList && leagues.length > 0 ? " · refreshing…" : ""}</div>
        </div>
        {isAdmin
          ? <button className="btn ghost" onClick={signOut}>Sign out</button>
          : <button className="btn ghost" onClick={signIn}>Admin sign in</button>}
      </div>

      <input ref={importFileRef} type="file" accept=".json" onChange={handleImport} style={{ display: "none" }} />

      {hasLegacy && (
        <div className="panel" style={{ marginBottom: 16, borderColor: "var(--accent)" }}>
          <div style={{ fontWeight: 700, marginBottom: 6 }}>Found existing season data</div>
          <div className="sub" style={{ marginBottom: 12 }}>Import your 2024 season into the new multi-league system.</div>
          <button className="btn" onClick={importLegacy}>Import 2024 season →</button>
        </div>
      )}

      {isAdmin && leagues.length > 0 && (
        <div style={{ marginBottom: 16 }}>
          <button className="btn ghost" onClick={() => importFileRef.current?.click()} disabled={importing}>
            {importing ? "Importing…" : "📥 Restore from backup"}
          </button>
        </div>
      )}

      {loadingList && leagues.length === 0 && (
        <div className="sub" style={{ marginBottom: 20 }}>Loading leagues…</div>
      )}

      {!loadingList && leagues.length === 0 && !hasLegacy && (
        <div className="sub" style={{ marginBottom: 20 }}>
          {isAdmin ? "No leagues yet. Create one to get started." : "No leagues yet. Check back once the admin sets one up."}
        </div>
      )}

      {leagues.map(l => (
        <div className="panel" key={l.id} style={{ marginBottom: 10 }}>
          <div className="league-card">
            <div>
              <div style={{ fontWeight: 800, fontSize: 16 }}>{l.name}</div>
              <div className="sub">{l.players.join(" · ")}</div>
            </div>
            <div className="row" style={{ gap: 8, flexWrap: "wrap" }}>
              <button className="btn ghost" onClick={() => copyViewerLink(l.id)}>
                {copied === l.id ? "✓ Copied!" : "Copy viewer link"}
              </button>
              {isAdmin && <button className="btn ghost" onClick={() => renameLeague(l.id, l.name)}>✏️ Rename</button>}
              {isAdmin && <button className="btn ghost" onClick={() => exportLeagueData(l.id, l.name)}>📥 Backup</button>}
              {isAdmin && <button className="btn ghost" style={{ color: "var(--pink)", borderColor: "rgba(255,126,182,.3)" }} onClick={() => deleteLeague(l.id, l.name)}>Delete</button>}
              <button className="btn" onClick={() => window.location.href = `?league=${l.id}${isAdmin ? "&admin=1" : ""}`}>Open →</button>
            </div>
          </div>
        </div>
      ))}

      <div style={{ marginTop: 20 }}>
        {!isAdmin ? null : !creating ? (
          <button className="btn" onClick={() => setCreating(true)}>+ New league</button>
        ) : (
          <div className="panel" style={{ maxWidth: 480 }}>
            <h2 style={{ marginBottom: 14 }}>New League</h2>
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 12, color: "var(--muted)", display: "block", marginBottom: 4 }}>LEAGUE NAME</label>
              <input className="text-input" value={newName} onChange={e => setNewName(e.target.value)} placeholder="e.g. Rollins League 2025" />
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, color: "var(--muted)", display: "block", marginBottom: 4 }}>PLAYERS (4)</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {newPlayers.map((p, i) => (
                  <input key={i} className="text-input" value={p}
                    onChange={e => { const a = [...newPlayers]; a[i] = e.target.value; setNewPlayers(a); }}
                    placeholder={`Player ${i + 1}`} />
                ))}
              </div>
            </div>
            <div className="row" style={{ gap: 8 }}>
              <button className="btn" onClick={create} disabled={!newName.trim() || newPlayers.filter(p => p.trim()).length !== 4}>
                Create league →
              </button>
              <button className="btn ghost" onClick={() => { setCreating(false); setNewName(""); setNewPlayers(["","","",""]); }}>Cancel</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ========== League App (async loader + Firestore bridge) ==========
function LeagueApp() {
  // Admins get an instant render from localStorage cache, then Firestore sync kicks in.
  // Viewers wait for the first Firestore snapshot.
  const [initState, setInitState]     = useState(() => IS_ADMIN ? loadLocalState(LEAGUE_ID) : null);
  const [remoteUpdate, setRemoteUpdate] = useState(null);
  const [loading, setLoading]         = useState(IS_ADMIN ? false : true);
  const [notFound, setNotFound]       = useState(false);

  useEffect(() => {
    if (!IS_ADMIN) {
      // Viewer: real-time subscription — updates push straight to the dashboard
      let initialized = false;
      const unsub = fsSubscribe(LEAGUE_ID, data => {
        if (!initialized) { setInitState(data); initialized = true; setLoading(false); }
        else setRemoteUpdate(data);
      });
      // If Firestore never responds after 10s, show "no data" instead of spinner forever
      const timeout = setTimeout(() => { if (!initialized) setLoading(false); }, 10000);
      return () => { unsub(); clearTimeout(timeout); };
    } else {
      // Admin: fetch latest from Firestore in the background.
      // If on a new device with no localStorage cache, this is the primary load.
      fsLoad(LEAGUE_ID).then(remote => {
        if (remote) {
          saveLocalState(LEAGUE_ID, remote);
          if (!initState) setInitState(remote);
          else setRemoteUpdate(remote); // sync newer cloud state into running app
        } else if (!initState) {
          setNotFound(true);
        }
        setLoading(false);
      }).catch(() => setLoading(false));
    }
  }, []);

  if (loading) {
    return (
      <div className="loading-screen">
        <div className="spinner" />
        <div>{IS_ADMIN ? "Loading league…" : "Connecting to league…"}</div>
      </div>
    );
  }

  if (!initState || notFound) {
    return IS_ADMIN
      ? <div style={{padding:40,color:"var(--muted)"}}>League not found. <a href={window.location.pathname} style={{color:"var(--accent)"}}>← Back to leagues</a></div>
      : (
        <div style={{ maxWidth: 480, margin: "60px auto", textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 16 }}>🔄</div>
          <h2 style={{ margin: "0 0 8px" }}>No data yet</h2>
          <div className="sub">The league admin hasn't published any scores yet. Check back once they update the board.</div>
          <div style={{ marginTop: 24, fontSize: 12, color: "var(--line)" }}>League ID: {LEAGUE_ID}</div>
        </div>
      );
  }

  const leagueInfo = loadLeagues().find(l => l.id === LEAGUE_ID);
  return <App initState={initState} leagueInfo={leagueInfo} remoteUpdate={remoteUpdate} />;
}

// ========== Replay Bar ==========
function ReplayBar({ week, setWeek, season, setSeason, loading, error, onExit }) {
  return (
    <div className="replay-bar">
      <span className="replay-badge">🔁 REPLAY</span>
      <div className="row" style={{ gap: 4 }}>
        {REPLAY_SEASONS.map(s => (
          <button key={s} className={"btn" + (season === s ? "" : " ghost")}
            style={{ padding: "4px 10px", fontSize: 12 }}
            onClick={() => { setSeason(s); setWeek(0); }}
            disabled={loading}>
            {s}
          </button>
        ))}
      </div>
      <button className="btn ghost" style={{ padding: "5px 10px" }} onClick={() => setWeek(w => Math.max(0, w - 1))} disabled={week <= 0 || loading}>◀</button>
      <span className="week-label">{loading ? "Loading…" : week === 0 ? "Pre-season" : `Week ${week} of ${REPLAY_WEEKS}`}</span>
      <button className="btn ghost" style={{ padding: "5px 10px" }} onClick={() => setWeek(w => Math.min(REPLAY_WEEKS, w + 1))} disabled={week >= REPLAY_WEEKS || loading}>▶</button>
      <div className="week-track">
        <input type="range" min={0} max={REPLAY_WEEKS} value={week} disabled={loading}
          onChange={e => setWeek(Number(e.target.value))} />
      </div>
      {error && <span style={{ color: "var(--pink)", fontSize: 12 }}>⚠️ {error}</span>}
      <button className="btn ghost" style={{ marginLeft: "auto" }} onClick={onExit}>Exit replay</button>
    </div>
  );
}

// ========== App ==========
function App({ initState, leagueInfo, remoteUpdate }) {
  // Seed the name from the local cache if the doc predates name storage (backfills on next save)
  const [st, setSt]       = useState(() => initState.name ? initState : { ...initState, name: leagueInfo?.name });
  const players = st.players || SEED_PLAYERS; // declared up top so all effects can reference it
  const [tab, setTab]     = useState("dashboard");
  const [syncStatus, setSyncStatus] = useState("saved");
  const [lastSync, setLastSync] = useState(null); // timestamp of last successful ESPN auto-sync
  const stRef = useRef(st);
  useEffect(() => { stRef.current = st; });

  // Auth: only the admin signs in. Viewers never touch this path.
  const [authUser, setAuthUser] = useState(() => auth.currentUser);
  useEffect(() => auth.onAuthStateChanged(setAuthUser), []);
  // canEdit gates every write/edit affordance. The Firestore rules enforce the
  // same thing server-side, so faking ?admin=1 can't actually save anything.
  const canEdit = IS_ADMIN && !!authUser && (ADMIN_CONFIGURED ? authUser.uid === ADMIN_UID : true);
  function signIn()  { auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert("Sign-in failed: " + e.message)); }
  function signOut() { auth.signOut(); }

  // Replay state
  const [replayMode, setReplayMode]   = useState(false);
  const [replaySeason, setReplaySeason] = useState(2025);
  const [replayWeek, setReplayWeek]   = useState(1);
  const [replayCache, setReplayCache] = useState({}); // "season-week" -> cumulative {team:[w,l]}
  const [replayLoading, setReplayLoading] = useState(false);
  const [replayError, setReplayError] = useState(null);
  const [replayRecords, setReplayRecords] = useState(null);

  // Apply real-time updates from Firestore (viewer live updates, admin multi-device sync)
  useEffect(() => {
    if (remoteUpdate) setSt(remoteUpdate);
  }, [remoteUpdate]);

  // Admin: save to localStorage immediately, Firestore with 1s debounce
  useEffect(() => {
    if (!canEdit) return;
    saveLocalState(LEAGUE_ID, st);
    setSyncStatus("syncing");
    const t = setTimeout(() => {
      fsSave(LEAGUE_ID, st)
        .then(() => setSyncStatus("saved"))
        .catch(() => setSyncStatus("error"));
    }, 1000);
    return () => clearTimeout(t);
  }, [st]);

  // Admin browser auto-sync: pull live ESPN data on open and every 3 min while
  // the tab stays open. Regenerates banked values + active records and caches
  // to Firestore for viewers. The scheduled GitHub Action covers the rest.
  const windowsRef = useRef(null); // { season, windows } — immutable completed windows, cached for the session
  useEffect(() => {
    if (!canEdit || replayMode) return;
    const curSeason = st.season || ESPN_SEASON;
    let cancelled = false;
    async function run() {
      try {
        const cache = (windowsRef.current && windowsRef.current.season === curSeason) ? windowsRef.current.windows : null;
        const res = await computeEspnSync(curSeason, stRef.current.roster, players, cache);
        if (cancelled || !res) return;
        windowsRef.current = { season: curSeason, windows: res.windows };
        setSt(s => ({ ...s, roster: res.roster, records: { ...s.records, ...res.records } }));
        setLastSync(Date.now());
      } catch (e) {}
    }
    run();
    const id = setInterval(run, 3 * 60 * 1000);
    return () => { cancelled = true; clearInterval(id); };
  }, [canEdit, replayMode, players, st.season]);

  // Fetch and accumulate records up to the selected replay week
  useEffect(() => {
    if (!replayMode) return;
    if (replayWeek === 0) {
      const zeros = {};
      Object.keys(st.records).forEach(t => { zeros[t] = [0, 0]; });
      setReplayRecords(zeros);
      setReplayLoading(false);
      setReplayError(null);
      return;
    }
    let cancelled = false;
    async function load() {
      setReplayLoading(true);
      setReplayError(null);
      setReplayRecords(null);
      try {
        const cacheKey = w => `${replaySeason}-${w}`;
        let cumulative = {};
        let startFrom  = 0;
        for (let w = replayWeek; w >= 1; w--) {
          if (replayCache[cacheKey(w)]) { cumulative = { ...replayCache[cacheKey(w)] }; startFrom = w; break; }
        }
        for (let w = startFrom + 1; w <= replayWeek; w++) {
          if (cancelled) return;
          const deltas = await fetchWeekScores(replaySeason, w);
          const next   = { ...cumulative };
          for (const [team, [wins, losses]] of Object.entries(deltas)) {
            if (!next[team]) next[team] = [0, 0];
            next[team] = [next[team][0] + wins, next[team][1] + losses];
          }
          cumulative = next;
          setReplayCache(c => ({ ...c, [cacheKey(w)]: cumulative }));
        }
        if (!cancelled) setReplayRecords(cumulative);
      } catch(e) {
        if (!cancelled) setReplayError(e.message || "Failed to load week data");
      } finally {
        if (!cancelled) setReplayLoading(false);
      }
    }
    load();
    return () => { cancelled = true; };
  }, [replayMode, replaySeason, replayWeek]);

  // When replaying: reconstruct roster for the current week and compute
  // adjusted records (cumulative ESPN minus banked periods).
  const activeSt = useMemo(() => {
    if (!replayMode || !replayRecords) return st;
    const replayRoster   = getReplayRoster(st.roster, replayWeek, players);
    const adjustedRecords = computeAdjustedRecords(replayRecords, replayRoster, players);
    return { ...st, roster: replayRoster, records: adjustedRecords };
  }, [replayMode, replayRecords, replayWeek, st, players]);

  const ranking = useMemo(() => {
    const totals = {};
    players.forEach(p => totals[p] = totalScore(p, activeSt));
    const order = [...players].sort((a, b) => totals[b] - totals[a]);
    const rank  = {};
    order.forEach((p, i) => rank[p] = i + 1);
    return { totals, rank, order };
  }, [activeSt, players]);

  function resetScores() {
    if (!confirm("Reset all W/L records to zero? Keeps the roster intact.")) return;
    const records = {};
    Object.keys(st.records).forEach(t => records[t] = [0, 0]);
    setSt(s => ({ ...s, records }));
  }

  // Keep the league's identity (name/createdAt) and drop draft → clears the live board
  function commitSeason(newState) { setSt(s => ({ ...newState, name: s.name, createdAt: s.createdAt })); setTab("dashboard"); }
  function syncDraft(d) { setSt(s => ({ ...s, draft: d })); }

  function enterReplay() { setReplayMode(true); setReplaySeason(2025); setReplayWeek(0); setReplayRecords(null); setTab("dashboard"); }
  function exitReplay()  { setReplayMode(false); setReplayRecords(null); setReplayError(null); }

  const [copied, setCopied] = useState(false);
  const viewerUrl = `${window.location.origin}${window.location.pathname}?league=${LEAGUE_ID}`;
  function copyViewer() {
    navigator.clipboard.writeText(viewerUrl).then(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  }

  const leagueName = st.name || leagueInfo?.name || "Trash & Treasures";
  const syncLabel = { saved: "Saved", syncing: "Saving…", error: "Sync error" }[syncStatus];
  const syncClass = { saved: "saved", syncing: "syncing", error: "error" }[syncStatus];
  // Fall back to the read-only dashboard if editing isn't allowed (e.g. signed out mid-edit)
  const activeTab = canEdit ? tab : "dashboard";

  return (
    <div>
      <div className="row between" style={{ flexWrap: "wrap", gap: 10 }}>
        <div>
          <h1>🗑️ Trash &amp; 💎 Treasures</h1>
          <div className="sub">
            {leagueName}
            {canEdit && !replayMode && (
              <span title={syncLabel}>
                <span className={"sync-dot " + syncClass} />
                <span style={{ fontSize: 11, marginLeft: 4, color: "var(--muted)" }}>{syncLabel}</span>
              </span>
            )}
            {canEdit && !replayMode && (
              <span style={{ fontSize: 11, marginLeft: 8, color: "var(--muted)" }}
                title="Auto-pulls ESPN scores while this tab is open">
                ⚡ ESPN auto-sync on{lastSync ? ` · ${new Date(lastSync).toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}` : ""}
              </span>
            )}
          </div>
        </div>
        <div className="row" style={{ gap: 8, flexWrap: "wrap" }}>
          {canEdit && !replayMode && <>
            <button className="btn ghost" onClick={copyViewer}>{copied ? "✓ Copied!" : "Share viewer link 🔗"}</button>
            <button className="btn ghost" onClick={resetScores}>Reset scores</button>
            <button className="btn ghost" onClick={enterReplay}>🔁 Replay</button>
          </>}
          {IS_ADMIN && (canEdit
            ? <button className="btn ghost" onClick={signOut}>Sign out</button>
            : <button className="btn" onClick={signIn}>Sign in to edit</button>)}
          <button className="btn ghost" style={{ fontSize: 12 }} onClick={() => window.location.href = window.location.pathname}>← Leagues</button>
        </div>
      </div>

      {!IS_ADMIN && <div className="viewer-banner">👀 View-only — scores update live when the admin makes changes.</div>}

      {IS_ADMIN && !canEdit && (
        <div className="viewer-banner" style={{ borderColor: "var(--accent)" }}>
          {!authUser
            ? <>🔒 Admin mode — <strong>sign in</strong> to edit. Viewers don't need to.</>
            : <>This Google account isn't the admin for this app. <a onClick={signOut} style={{ color: "var(--accent)", cursor: "pointer" }}>Switch account</a>.</>}
        </div>
      )}

      {canEdit && !ADMIN_CONFIGURED && (
        <div className="viewer-banner" style={{ borderColor: "var(--treasure)" }}>
          ⚠️ <strong>Setup mode.</strong> Paste this UID into <code>ADMIN_UID</code> (in index.html) and your Firestore rules, then redeploy to lock editing to just you:
          <div style={{ marginTop: 6, fontFamily: "monospace", fontSize: 12, color: "var(--treasure)", wordBreak: "break-all" }}>{authUser.uid}</div>
        </div>
      )}

      {replayMode && (
        <ReplayBar
          week={replayWeek}
          setWeek={setReplayWeek}
          season={replaySeason}
          setSeason={setReplaySeason}
          loading={replayLoading}
          error={replayError}
          onExit={exitReplay}
        />
      )}

      <div className="tabs">
        <button className={"tab" + (activeTab === "dashboard" ? " active" : "")} onClick={() => setTab("dashboard")}>Dashboard</button>
        {canEdit && <button className={"tab" + (activeTab === "edit" ? " active" : "")} onClick={() => setTab("edit")}>Edit</button>}
        {canEdit && <button className={"tab" + (activeTab === "swap" ? " active" : "")} onClick={() => setTab("swap")}>Swap</button>}
        {canEdit && <button className={"tab" + (activeTab === "draft" ? " active" : "")} onClick={() => setTab("draft")}>Draft</button>}
      </div>

      {activeTab === "dashboard"
        ? <Dashboard st={activeSt} ranking={ranking} players={players} />
        : activeTab === "edit"
        ? <Edit st={st} setSt={setSt} players={players} leagueId={LEAGUE_ID} leagueName={leagueName} />
        : activeTab === "swap"
        ? <Swap st={st} setSt={setSt} players={players} replayRecords={replayMode ? replayRecords : null} />
        : <Draft commitSeason={commitSeason} players={players} leagueId={LEAGUE_ID}
                 initialDraft={st.draft} syncDraft={syncDraft} season={st.season || ESPN_SEASON} />}
    </div>
  );
}

function ordinal(n) { return n === 1 ? "1st" : n === 2 ? "2nd" : n === 3 ? "3rd" : n + "th"; }

function Section({ section, label, records }) {
  return (
    <React.Fragment>
      <div className={"sec-head " + label}>{label === "treasure" ? "💎 Treasures" : "🗑️ Trash"}</div>
      <table className="tt">
        <thead><tr><th className="tm">Team</th><th>W</th><th>L</th><th>Pts</th></tr></thead>
        <tbody>
          {section.active.map(([team, swap], i) => {
            const r = records[team] || [0,0];
            return (
              <tr key={"a"+i} className={swap === "wk6" ? "swap-wk6" : swap === "wk12" ? "swap-wk12" : ""}>
                <td className="tm" style={{ ["--tc"]: COLORS[team] || "#666" }} title={team}>
                  {TEAM_ABBREV[team] && <img className="team-logo-sm" src={teamLogo(team)} alt="" />}{team}
                </td>
                <td>{r[0]}</td><td>{r[1]}</td>
                <td className="pts">{activePts(team, label, records)}</td>
              </tr>
            );
          })}
          {section.locked.map(([team, w, l, win], i) => {
            const lk = win === "Weeks 1-6" ? " lk-wk6" : win === "Weeks 7-12" ? " lk-wk12" : "";
            return (
            <React.Fragment key={"l"+i}>
              <tr className={"lockrow" + lk}><td colSpan="4">🔒 {win} performance (locked)</td></tr>
              <tr className={"locked" + lk}>
                <td className="tm" title={team}>
                  {TEAM_ABBREV[team] && <img className="team-logo-sm" src={teamLogo(team)} alt="" />}{team}
                </td>
                <td>{w}</td><td>{l}</td>
                <td className="pts">{lockedPts(label, w, l)}</td>
              </tr>
            </React.Fragment>
            );
          })}
        </tbody>
      </table>
    </React.Fragment>
  );
}

function Dashboard({ st, ranking, players }) {
  const draftLive = st.draft && (st.draft.phase === "draft" || st.draft.phase === "review");
  return (
    <div>
      {draftLive && <DraftLive draft={st.draft} players={players} />}
      <div className="dash">
        {players.map(p => {
          const data = st.roster[p];
          if (!data) return null;
          const rank = ranking.rank[p];
          return (
            <div className="col" key={p}>
              <div className="col-head">{p}</div>
              <Section section={data.treasures} label="treasure" records={st.records} />
              <Section section={data.trash} label="trash" records={st.records} />
              <div className="col-foot">
                <span className={"rankbadge" + (rank === 1 ? " r1" : "")}>{ordinal(rank)}</span>
                <span className="foot-total">{ranking.totals[p]}</span>
              </div>
            </div>
          );
        })}
      </div>
      <div className="bottom">
        <div className="panel">
          <h2>Standings</h2>
          <table className="standings">
            <thead><tr><th className="l">Pos</th><th className="l">Player</th><th>W's from Winners</th><th>L's from Losers</th><th>Total</th></tr></thead>
            <tbody>
              {ranking.order.map(p => (
                <tr key={p}>
                  <td className="l"><span className={"rankbadge" + (ranking.rank[p] === 1 ? " r1" : "")}>{ordinal(ranking.rank[p])}</span></td>
                  <td className="l" style={{ fontWeight: 700 }}>{p}</td>
                  <td style={{ color: "var(--treasure)" }}>{winnersScore(p, st)}</td>
                  <td style={{ color: "var(--trash)" }}>{losersScore(p, st)}</td>
                  <td style={{ fontWeight: 800 }}>{ranking.totals[p]}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="panel">
          <h2>Legend</h2>
          <div className="legend-item"><span className="swatch pink"></span> Team swapped in after Weeks 1-6</div>
          <div className="legend-item"><span className="swatch teal"></span> Team swapped in after Weeks 7-12</div>
          <div className="sub" style={{ marginTop: 8 }}>Greyed "locked" rows are the original picks' banked performance — they still count toward the total.</div>
        </div>
      </div>
    </div>
  );
}

function Edit({ st, setSt, players, leagueId, leagueName }) {
  const season = st.season || ESPN_SEASON;
  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState(null);          // { type: "ok"|"err"|"info", text }
  const [undoSnapshot, setUndoSnapshot] = useState(null);  // { records, roster } pre-sync snapshot

  function setSeason(yr) { setSt(s => ({ ...s, season: Number(yr) })); setSyncMsg(null); }

  function backupNow() { exportLeagueData(leagueId, leagueName); }

  async function syncFromESPN() {
    setSyncing(true); setSyncMsg(null);
    try {
      const res = await computeEspnSync(season, st.roster, players, null);
      // Guard: don't let an unstarted/empty season wipe good data
      if (!res) {
        setSyncMsg({ type: "err", text: `ESPN shows no completed games for ${season} yet — nothing synced. Your data was left as-is.` });
        return;
      }
      if (!confirm(`Pull ${season} from ESPN?\n\nUpdates active records AND recomputes banked (locked) values from real per-window game results. You can Undo right after.`)) return;
      setUndoSnapshot({ records: JSON.parse(JSON.stringify(st.records)), roster: JSON.parse(JSON.stringify(st.roster)) });
      setSt(s => ({ ...s, roster: res.roster, records: { ...s.records, ...res.records } }));
      setSyncMsg({ type: "ok", text: `✓ Synced ${season}: active records and banked values from real games.` });
    } catch (e) {
      setSyncMsg({ type: "err", text: `ESPN sync failed: ${e.message || e}. Data unchanged.` });
    } finally {
      setSyncing(false);
    }
  }

  function undoSync() {
    if (!undoSnapshot) return;
    setSt(s => ({ ...s, records: undoSnapshot.records, roster: undoSnapshot.roster }));
    setUndoSnapshot(null);
    setSyncMsg({ type: "info", text: "Reverted to pre-sync data." });
  }

  function setRec(team, idx, val) {
    const n = Math.max(0, Math.min(20, parseInt(val, 10) || 0));
    setSt(s => ({ ...s, records: { ...s.records, [team]: idx === 0 ? [n, (s.records[team]||[0,0])[1]] : [(s.records[team]||[0,0])[0], n] } }));
  }
  function setLocked(player, sec, rowIdx, field, val) {
    const n = Math.max(0, Math.min(20, parseInt(val, 10) || 0));
    setSt(s => {
      const roster = JSON.parse(JSON.stringify(s.roster));
      roster[player][sec].locked[rowIdx][field] = n;
      return { ...s, roster };
    });
  }
  const msgColor = syncMsg ? (syncMsg.type === "ok" ? "#4ade80" : syncMsg.type === "err" ? "var(--pink)" : "var(--muted)") : null;
  return (
    <div>
      <div className="panel" style={{ marginBottom: 16 }}>
        <div className="row between" style={{ flexWrap: "wrap", gap: 10 }}>
          <div className="row" style={{ gap: 10, flexWrap: "wrap" }}>
            <label style={{ fontSize: 12, color: "var(--muted)" }}>SEASON</label>
            <select className="text-input" style={{ width: "auto" }} value={season} onChange={e => setSeason(e.target.value)}>
              {SEASONS.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
            <button className="btn" onClick={syncFromESPN} disabled={syncing}>
              {syncing ? "Syncing…" : `⟳ Pull ${season} records from ESPN`}
            </button>
            {undoSnapshot && <button className="btn ghost" onClick={undoSync}>↩ Undo sync</button>}
          </div>
          <button className="btn ghost" onClick={backupNow} title="Download a restore-compatible JSON snapshot">⬇️ Backup now</button>
        </div>
        {syncMsg && <div style={{ marginTop: 10, fontSize: 13, color: msgColor }}>{syncMsg.text}</div>}
        <div className="sub" style={{ marginTop: 8 }}>
          Auto-sync pulls live W/L from ESPN for the selected season: it sets active team records and regenerates banked (locked) values from each team's real per-window performance. It warns instead of wiping if the season hasn't started, and can be undone. Back up first if you want a durable safety net.
        </div>
      </div>
      <div className="sub" style={{ marginBottom: 14 }}>Or update active team records by hand below. Locked rows are banked swap history — edit only to correct.</div>
      <div className="editgrid">
        {players.map(p => {
          if (!st.roster[p]) return null;
          return (
            <div className="panel" key={p}>
              <h2 style={{ marginBottom: 4 }}>{p}</h2>
              {["treasures","trash"].map(sec => {
                const label = sec === "treasures" ? "treasure" : "trash";
                return (
                  <div key={sec}>
                    <div className={"sec-head " + label} style={{ padding: "8px 0 2px" }}>{sec === "treasures" ? "💎 Treasures" : "🗑️ Trash"}</div>
                    {st.roster[p][sec].active.map(([team], i) => {
                      const r = st.records[team] || [0,0];
                      return (
                        <div className="erow" key={i}>
                          <span className="lbl" title={team}>{team}</span>
                          <input type="number" value={r[0]} onChange={e => setRec(team, 0, e.target.value)} title="Wins" />
                          <input type="number" value={r[1]} onChange={e => setRec(team, 1, e.target.value)} title="Losses" />
                        </div>
                      );
                    })}
                    <div className="ehdr">Locked (banked)</div>
                    {st.roster[p][sec].locked.map(([team, w, l, win], i) => (
                      <div className="erow" key={"L"+i}>
                        <span className="lbl" title={team}>{team} · {win}</span>
                        <input type="number" value={w} onChange={e => setLocked(p, sec, i, 1, e.target.value)} title="Wins" />
                        <input type="number" value={l} onChange={e => setLocked(p, sec, i, 2, e.target.value)} title="Losses" />
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ========== Swap ==========
const SWAP_WINDOWS = [
  { key: "wk6",  label: "After Week 6",  period: "Weeks 1-6"  },
  { key: "wk12", label: "After Week 12", period: "Weeks 7-12" },
];

function SwapTeamRow({ team, records, selected, label, onClick }) {
  const [w, l] = records[team] || [0, 0];
  const pts    = label === "treasure" ? w : l;
  return (
    <div onClick={onClick} style={{
      display: "flex", alignItems: "center", gap: 8,
      padding: "6px 8px", borderRadius: 8, cursor: "pointer", marginBottom: 3,
      background: selected
        ? label === "treasure" ? "rgba(79,176,255,.18)" : "rgba(245,197,66,.14)"
        : "var(--panel-2)",
      border: `1px solid ${selected
        ? label === "treasure" ? "var(--trash)" : "var(--treasure)"
        : "var(--line)"}`,
    }}>
      {TEAM_ABBREV[team] && <img className="team-logo-sm" src={teamLogo(team)} alt="" />}
      <span style={{ flex: 1, fontSize: 12, fontWeight: selected ? 700 : 500 }}>
        {selected && (label === "treasure" ? "→🗑️ " : "→💎 ")}{team}
      </span>
      <span style={{ fontSize: 11, color: "var(--muted)", fontVariantNumeric: "tabular-nums" }}>{w}W {l}L</span>
      <span style={{
        fontSize: 11, fontWeight: 800, minWidth: 28, textAlign: "right",
        color: selected ? (label === "treasure" ? "var(--trash)" : "var(--treasure)") : "var(--muted)"
      }}>{pts}pt{pts !== 1 ? "s" : ""}</span>
    </div>
  );
}

// Pure: returns the state after applying the given selections at a window.
// Shared by the live preview and the actual commit so they can't drift.
function applySwaps(prev, selections, win, period, source, players) {
  const roster  = JSON.parse(JSON.stringify(prev.roster));
  const records = { ...prev.records };
  for (const player of players) {
    const sel = selections[player];
    const pr  = roster[player];
    if (!sel || !pr) continue;
    if (sel.treasureOut) {
      const team = sel.treasureOut;
      const [w, l] = source[team] || [0, 0];
      pr.treasures.locked.push([team, w, l, period]);
      pr.treasures.active = pr.treasures.active.filter(([t]) => t !== team);
      pr.trash.active.push([team, win]);
      records[team] = [0, 0];
    }
    if (sel.trashOut) {
      const team = sel.trashOut;
      const [w, l] = source[team] || [0, 0];
      pr.trash.locked.push([team, w, l, period]);
      pr.trash.active = pr.trash.active.filter(([t]) => t !== team);
      pr.treasures.active.push([team, win]);
      records[team] = [0, 0];
    }
  }
  return { ...prev, roster, records };
}

function Swap({ st, setSt, players, replayRecords }) {
  const liveRecords = replayRecords || st.records;

  const doneWk6  = players.some(p => {
    const r = st.roster[p];
    return r && ([...r.treasures.active, ...r.trash.active].some(([,s]) => s === "wk6"));
  });
  const doneWk12 = players.some(p => {
    const r = st.roster[p];
    return r && ([...r.treasures.active, ...r.trash.active].some(([,s]) => s === "wk12"));
  });
  const done = { wk6: doneWk6, wk12: doneWk12 };

  const [win, setWin] = useState(!doneWk6 ? "wk6" : "wk12");
  const [selections, setSelections] = useState(() =>
    Object.fromEntries(players.map(p => [p, { treasureOut: "", trashOut: "" }]))
  );

  const winInfo  = SWAP_WINDOWS.find(w => w.key === win);
  const isDone   = done[win];
  const [editing, setEditing] = useState(false);

  function toggle(player, field, team) {
    setSelections(s => ({ ...s, [player]: { ...s[player], [field]: s[player][field] === team ? "" : team } }));
  }

  // Checkpoint gating: the Week 12 window opens only after Week 6 swaps exist.
  const wk12Locked = !doneWk6;
  function changeWindow(key) {
    if (key === "wk12" && wk12Locked) return;
    setWin(key);
    setEditing(false);
    setSelections(Object.fromEntries(players.map(p => [p, { treasureOut: "", trashOut: "" }])));
  }

  function startEditing() {
    // Capture previous selections before undoing so UI comes back pre-filled
    const prev = Object.fromEntries(players.map(p => {
      const pr = st.roster[p];
      if (!pr) return [p, { treasureOut: "", trashOut: "" }];
      return [p, {
        treasureOut: pr.trash.active.find(([,s]) => s === win)?.[0] || "",
        trashOut:    pr.treasures.active.find(([,s]) => s === win)?.[0] || "",
      }];
    }));

    // Undo: reverse the swap in st, restoring records from locked entries
    setSt(cur => {
      const roster  = JSON.parse(JSON.stringify(cur.roster));
      const records = { ...cur.records };
      for (const player of players) {
        const pr = roster[player];
        if (!pr) continue;
        // Teams currently in trash with this marker came FROM treasures
        const fromTreasures = pr.trash.active.filter(([,s]) => s === win).map(([t]) => t);
        // Teams currently in treasures with this marker came FROM trash
        const fromTrash = pr.treasures.active.filter(([,s]) => s === win).map(([t]) => t);

        for (const team of fromTreasures) {
          const lk = pr.treasures.locked.find(([t,,,pd]) => t === team && pd === winInfo.period);
          if (lk) { records[team] = [lk[1], lk[2]]; pr.treasures.locked = pr.treasures.locked.filter(x => x !== lk); }
          pr.trash.active     = pr.trash.active.filter(([t,s]) => !(t === team && s === win));
          pr.treasures.active.push([team, null]);
        }
        for (const team of fromTrash) {
          const lk = pr.trash.locked.find(([t,,,pd]) => t === team && pd === winInfo.period);
          if (lk) { records[team] = [lk[1], lk[2]]; pr.trash.locked = pr.trash.locked.filter(x => x !== lk); }
          pr.treasures.active = pr.treasures.active.filter(([t,s]) => !(t === team && s === win));
          pr.trash.active.push([team, null]);
        }
      }
      return { ...cur, roster, records };
    });

    setSelections(prev);
    setEditing(true);
  }

  function commitSwap() {
    const lines = players.flatMap(p => {
      const sel = selections[p];
      const out = [];
      if (sel.treasureOut) out.push(`${p}: 💎 ${sel.treasureOut} → 🗑️ Trash`);
      if (sel.trashOut)    out.push(`${p}: 🗑️ ${sel.trashOut} → 💎 Treasure`);
      return out;
    });
    if (!lines.length) return;
    if (incompletePlayers.length) { alert(`Each swap must move one Treasure AND one Trash so every player stays 4 & 4.\n\nFinish or clear: ${incompletePlayers.join(", ")}`); return; }
    if (!confirm(`Apply ${winInfo.label} swaps?\n\n${lines.join("\n")}\n\nBanked W/L will be locked. Cannot be undone.`)) return;

    setSt(prev => applySwaps(prev, selections, win, winInfo.period, replayRecords || prev.records, players));
    setSelections(Object.fromEntries(players.map(p => [p, { treasureOut: "", trashOut: "" }])));
    setEditing(false);
  }

  const hasSelection = players.some(p => selections[p].treasureOut || selections[p].trashOut);
  const selectedCount = players.filter(p => selections[p].treasureOut && selections[p].trashOut).length;
  // A swap must be paired (one out of each category) to keep every player at 4 & 4.
  const incompletePlayers = players.filter(p => !!selections[p].treasureOut !== !!selections[p].trashOut);
  const canApply = hasSelection && incompletePlayers.length === 0;

  // Live projected state + standings for the preview board (only when valid)
  const previewState = canApply ? applySwaps(st, selections, win, winInfo.period, liveRecords, players) : null;
  function rankingFor(state) {
    const totals = {}; players.forEach(p => totals[p] = totalScore(p, state));
    const order = [...players].sort((a, b) => totals[b] - totals[a]);
    const rank = {}; order.forEach((p, i) => rank[p] = i + 1);
    return { totals, rank, order };
  }
  // Plain-language description of one pending selection
  function impactLine(team, from) {
    const [w, l] = liveRecords[team] || [0, 0];
    const pts = from === "treasure" ? w : l;
    return from === "treasure"
      ? `💎→🗑️ ${team} · locks ${pts} pt${pts !== 1 ? "s" : ""} (${w}W-${l}L), then scores losses`
      : `🗑️→💎 ${team} · locks ${pts} pt${pts !== 1 ? "s" : ""} (${w}W-${l}L), then scores wins`;
  }

  // Reconstruct swap decisions from roster markers + locked entries
  function getSwapSummary() {
    return Object.fromEntries(players.map(p => {
      const pr = st.roster[p];
      if (!pr) return [p, { toTreasure: [], toTrash: [] }];
      const toTreasure = pr.treasures.active
        .filter(([,s]) => s === win)
        .map(([team]) => {
          const locked = pr.trash.locked.find(([t,,,pd]) => t === team && pd === winInfo.period);
          return { team, w: locked?.[1] ?? 0, l: locked?.[2] ?? 0 };
        });
      const toTrash = pr.trash.active
        .filter(([,s]) => s === win)
        .map(([team]) => {
          const locked = pr.treasures.locked.find(([t,,,pd]) => t === team && pd === winInfo.period);
          return { team, w: locked?.[1] ?? 0, l: locked?.[2] ?? 0 };
        });
      return [p, { toTreasure, toTrash }];
    }));
  }

  const WindowTabs = () => (
    <div className="row" style={{ gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
      {SWAP_WINDOWS.map(w => {
        const locked = w.key === "wk12" && wk12Locked;
        return (
          <button key={w.key}
            className={"btn" + (win === w.key ? "" : " ghost")}
            disabled={locked}
            title={locked ? "Opens once the After Week 6 swaps are applied" : ""}
            onClick={() => changeWindow(w.key)}>
            {w.label} {done[w.key] ? "✓" : locked ? "🔒" : ""}
          </button>
        );
      })}
    </div>
  );

  // ---- Summary view (swap already applied) ----
  if (isDone && !editing) {
    const summary = getSwapSummary();
    return (
      <div>
        <div className="row between" style={{ marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
          <WindowTabs />
          <button className="btn ghost" onClick={startEditing}>✏️ Edit swaps</button>
        </div>
        <div className="sub" style={{ marginBottom: 16 }}>Swap decisions for <strong>{winInfo.label}</strong></div>
        <div className="dash">
          {players.map(p => {
            const { toTreasure, toTrash } = summary[p] || { toTreasure: [], toTrash: [] };
            const noSwap = !toTreasure.length && !toTrash.length;
            return (
              <div className="col" key={p}>
                <div className="col-head">{p}</div>
                <div style={{ padding: "10px 12px" }}>
                  {noSwap ? (
                    <div className="sub">No swap made</div>
                  ) : (
                    <>
                      {toTreasure.map(({ team, w, l }) => (
                        <div key={team} style={{ marginBottom: 8 }}>
                          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 3 }}>🗑️ → 💎 Moved to Treasure</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            {TEAM_ABBREV[team] && <img className="team-logo-sm" src={teamLogo(team)} alt="" />}
                            <span style={{ fontSize: 13, fontWeight: 700 }}>{team}</span>
                          </div>
                          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>
                            Banked as Trash: {w}W–{l}L ({l} pts)
                          </div>
                        </div>
                      ))}
                      {toTrash.map(({ team, w, l }) => (
                        <div key={team} style={{ marginBottom: 8 }}>
                          <div style={{ fontSize: 11, color: "var(--muted)", marginBottom: 3 }}>💎 → 🗑️ Moved to Trash</div>
                          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                            {TEAM_ABBREV[team] && <img className="team-logo-sm" src={teamLogo(team)} alt="" />}
                            <span style={{ fontSize: 13, fontWeight: 700 }}>{team}</span>
                          </div>
                          <div style={{ fontSize: 11, color: "var(--muted)", marginTop: 2 }}>
                            Banked as Treasure: {w}W–{l}L ({w} pts)
                          </div>
                        </div>
                      ))}
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ---- Decision UI (swap not yet applied) ----
  return (
    <div>
      <WindowTabs />
      <div className="row between" style={{ marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div className="sub">
          A swap moves one Treasure <strong>and</strong> one Trash for <strong>{winInfo.label}</strong> — so every player stays 4 &amp; 4. Tap to select, tap again to deselect.
          {replayRecords && <span style={{ color: "var(--accent)", marginLeft: 8 }}>Using replay records for banking.</span>}
        </div>
        <div className="sub">{selectedCount} of {players.length} players have a complete swap</div>
      </div>
      <div className="dash">
        {players.map(p => {
          const pr  = st.roster[p];
          if (!pr) return null;
          const sel = selections[p];
          const both = !!(sel.treasureOut && sel.trashOut);
          const partial = !!(sel.treasureOut || sel.trashOut) && !both;
          const flag = both ? { t: "● swap ready", c: "var(--accent)" }
                     : partial ? { t: "⚠ pick the other side", c: "var(--pink)" }
                     : { t: "○ no swap", c: "var(--muted)" };
          return (
            <div className="col" key={p}>
              <div className="col-head" style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span>{p}</span>
                <span style={{ fontSize: 10, fontWeight: 700, color: flag.c }}>{flag.t}</span>
              </div>

              <div className="sec-head treasure">💎 Treasures → tap to move to Trash</div>
              <div style={{ padding: "4px 8px 8px" }}>
                {pr.treasures.active.map(([team]) => (
                  <SwapTeamRow key={team} team={team} records={liveRecords} label="treasure"
                    selected={sel.treasureOut === team}
                    onClick={() => toggle(p, "treasureOut", team)} />
                ))}
              </div>

              <div className="sec-head trash">🗑️ Trash → tap to move to Treasures</div>
              <div style={{ padding: "4px 8px 8px" }}>
                {pr.trash.active.map(([team]) => (
                  <SwapTeamRow key={team} team={team} records={liveRecords} label="trash"
                    selected={sel.trashOut === team}
                    onClick={() => toggle(p, "trashOut", team)} />
                ))}
              </div>

              {(sel.treasureOut || sel.trashOut) && (
                <div style={{ padding: "8px 12px", borderTop: "1px solid var(--line)", fontSize: 11.5, color: "var(--muted)" }}>
                  {partial && <div style={{ color: "var(--pink)", marginBottom: 5 }}>Pick one from the {sel.treasureOut ? "Trash" : "Treasures"} side to complete this swap.</div>}
                  {sel.treasureOut && (
                    <div style={{ marginBottom: sel.trashOut ? 5 : 0 }}>
                      {impactLine(sel.treasureOut, "treasure")}{" "}
                      <a onClick={() => toggle(p, "treasureOut", sel.treasureOut)} style={{ color: "var(--accent)", cursor: "pointer" }}>clear</a>
                    </div>
                  )}
                  {sel.trashOut && (
                    <div>
                      {impactLine(sel.trashOut, "trash")}{" "}
                      <a onClick={() => toggle(p, "trashOut", sel.trashOut)} style={{ color: "var(--accent)", cursor: "pointer" }}>clear</a>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div className="row" style={{ gap: 12, marginTop: 20 }}>
        <button className="btn" onClick={commitSwap} disabled={!canApply}>Apply swaps →</button>
        {!hasSelection && <span className="sub">Tap teams above to select swaps</span>}
        {incompletePlayers.length > 0 && (
          <span className="sub" style={{ color: "var(--pink)" }}>
            ⚠ Finish the pair for {incompletePlayers.join(", ")} — each swap moves one Treasure and one Trash.
          </span>
        )}
      </div>

      {previewState && (
        <div style={{ marginTop: 24, border: "1px solid var(--accent)", borderRadius: 12, padding: "14px 14px 4px" }}>
          <div className="row between" style={{ marginBottom: 10, flexWrap: "wrap", gap: 8 }}>
            <span className="replay-badge">👁 PREVIEW</span>
            <span className="sub">How the board looks after applying — totals hold; teams move sections and lock their current points.</span>
          </div>
          <Dashboard st={{ ...previewState, draft: null }} ranking={rankingFor(previewState)} players={players} />
        </div>
      )}
    </div>
  );
}

function DraftRosterPreview({ picks, order, current }) {
  return (
    <div className="dash draft-preview">
      {order.map(p => {
        const treasures = picks.filter(x => x.player === p && x.type === "treasure");
        const trash     = picks.filter(x => x.player === p && x.type === "trash");
        return (
          <div className={"col" + (p === current ? " col-on" : "")} key={p}>
            <div className="col-head">{p}</div>
            <div className="sec-head treasure">💎 Treasures</div>
            <table className="tt"><tbody>
              {Array.from({ length: PER_CAT }).map((_, i) => {
                const pk = treasures[i];
                return pk
                  ? <tr key={i}><td className="tm" style={{ ["--tc"]: COLORS[pk.team]||"#666" }} title={pk.team}>{TEAM_ABBREV[pk.team] && <img className="team-logo-sm" src={teamLogo(pk.team)} alt="" />}{pk.team}</td></tr>
                  : <tr key={i} className="empty-slot"><td className="tm">—</td></tr>;
              })}
            </tbody></table>
            <div className="sec-head trash">🗑️ Trash</div>
            <table className="tt"><tbody>
              {Array.from({ length: PER_CAT }).map((_, i) => {
                const pk = trash[i];
                return pk
                  ? <tr key={i}><td className="tm" style={{ ["--tc"]: COLORS[pk.team]||"#666" }} title={pk.team}>{TEAM_ABBREV[pk.team] && <img className="team-logo-sm" src={teamLogo(pk.team)} alt="" />}{pk.team}</td></tr>
                  : <tr key={i} className="empty-slot"><td className="tm">—</td></tr>;
              })}
            </tbody></table>
          </div>
        );
      })}
    </div>
  );
}

// Read-only live draft board shown to viewers (and on the admin's dashboard)
// while a draft is in progress. Fed straight from the synced st.draft.
function DraftLive({ draft, players }) {
  const order = (draft.order && draft.order.length) ? draft.order : players;
  const totalPicks = ROUNDS * players.length;
  const pickIndex  = draft.picks.length;
  const current    = draft.phase === "draft" && pickIndex < totalPicks ? snakePlayer(order, pickIndex) : null;
  const round      = Math.floor(pickIndex / players.length) + 1;
  return (
    <div style={{ marginBottom: 16 }}>
      <div className="pickbar" style={{ borderColor: "var(--accent)" }}>
        <div>
          <div className="who">{draft.phase === "review" ? "✅ Draft complete" : `🟢 ${current} on the clock`}</div>
          <div className="meta">
            {draft.phase === "review"
              ? "Waiting for the admin to start the season…"
              : `Live draft · Round ${round} of ${ROUNDS} · Pick ${pickIndex + 1} of ${totalPicks}`}
          </div>
        </div>
        <span className="replay-badge">🔴 LIVE</span>
      </div>
      <DraftRosterPreview picks={draft.picks} order={order} current={current} />
    </div>
  );
}

function Draft({ commitSeason, players, leagueId, initialDraft, syncDraft, season = ESPN_SEASON }) {
  const [draft, setDraft] = useState(() => initialDraft || loadDraft(leagueId) || { phase: "order", order: [...players], picks: [] });
  const [teamData, setTeamData] = useState(null);
  const [tdLoading, setTdLoading] = useState(true);
  const [tdError, setTdError] = useState(null);
  const [dragPlayer, setDragPlayer] = useState(null);
  const dragFromIdx = useRef(null);

  // Push every draft change up into shared state → Firestore → viewers watch live
  useEffect(() => { syncDraft(draft); }, [draft]);

  function loadESPN() {
    setTdLoading(true); setTdError(null);
    fetchTeamData(season)
      .then(d => { setTeamData(d); setTdLoading(false); })
      .catch(e => { setTdError(e.message || "Failed"); setTdLoading(false); });
  }
  useEffect(loadESPN, [season]);

  const totalPicks = ROUNDS * players.length;
  const taken  = useMemo(() => new Set(draft.picks.map(p => p.team)), [draft.picks]);
  const counts = useMemo(() => {
    const c = {}; players.forEach(p => c[p] = { treasure:0, trash:0 });
    draft.picks.forEach(({ player, type }) => c[player][type]++);
    return c;
  }, [draft.picks, players]);

  const pickIndex = draft.picks.length;
  const current   = pickIndex < totalPicks ? snakePlayer(draft.order, pickIndex) : null;
  const round     = Math.floor(pickIndex / players.length) + 1;

  function move(i, dir) {
    setDraft(d => { const o=[...d.order]; const j=i+dir; if(j<0||j>=o.length) return d; [o[i],o[j]]=[o[j],o[i]]; return {...d,order:o}; });
  }
  function randomize() {
    setDraft(d => { const o=[...d.order]; for(let i=o.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]];} return {...d,order:o}; });
  }
  function startDraft() { setDraft(d => ({...d, phase:"draft"})); }
  function onDragStart(e,p,i) { dragFromIdx.current=i; setDragPlayer(p); e.dataTransfer.effectAllowed="move"; }
  function onDragOver(e,i) {
    e.preventDefault(); const from=dragFromIdx.current;
    if(from===null||from===i) return;
    setDraft(d => { const o=[...d.order]; const [item]=o.splice(from,1); o.splice(i,0,item); return {...d,order:o}; });
    dragFromIdx.current=i;
  }
  function onDragEnd() { dragFromIdx.current=null; setDragPlayer(null); }
  function pick(team, type) {
    setDraft(d => {
      const idx=d.picks.length; if(idx>=totalPicks) return d;
      const cur=snakePlayer(d.order,idx);
      if(d.picks.filter(p=>p.player===cur&&p.type===type).length>=PER_CAT) return d;
      const picks=[...d.picks,{player:cur,team,type,round:Math.floor(idx/players.length)+1}];
      return {...d,picks,phase:picks.length>=totalPicks?"review":"draft"};
    });
  }
  function undo() { setDraft(d => d.picks.length ? {...d,picks:d.picks.slice(0,-1),phase:"draft"} : d); }
  function restart() { if(confirm("Clear this draft and start over?")) setDraft({phase:"order",order:[...players],picks:[]}); }
  function finish() {
    if(!confirm("Start the season with this draft? This replaces the current board.")) return;
    localStorage.removeItem(draftKey(leagueId));
    commitSeason(buildStateFromPicks(draft.picks, players));
  }

  if (draft.phase === "order") return (
    <div>
      <div className="sub" style={{marginBottom:8}}>Drag to reorder, then snake-draft 4 💎 Treasures and 4 🗑️ Trash per player — 8 rounds total.</div>
      {tdLoading && <div className="espn-status">⏳ Loading {season} standings from ESPN…</div>}
      {tdError && <div className="espn-status err">⚠️ ESPN load failed: {tdError} <button className="btn ghost" style={{marginLeft:8,padding:"3px 10px"}} onClick={loadESPN}>Retry</button></div>}
      {teamData && <div className="espn-status">✓ {season} standings loaded</div>}
      <button className="btn ghost" onClick={randomize} style={{marginBottom:12}}>🎲 Randomize order</button>
      <div className="draft-order-list">
        {draft.order.map((p,i) => (
          <div className={"draft-order-item"+(dragPlayer===p?" dragging":"")} key={p} draggable
            onDragStart={e=>onDragStart(e,p,i)} onDragOver={e=>onDragOver(e,i)} onDragEnd={onDragEnd}>
            <span className="num">{i+1}</span><span className="nm">{p}</span>
            <button className="iconbtn" disabled={i===0} onClick={()=>move(i,-1)}>↑</button>
            <button className="iconbtn" disabled={i===draft.order.length-1} onClick={()=>move(i,1)}>↓</button>
          </div>
        ))}
      </div>
      <button className="btn" onClick={startDraft} disabled={tdLoading}>Start draft →</button>
    </div>
  );

  if (draft.phase === "review") return (
    <div>
      <div className="pickbar">
        <div><div className="who">✅ Draft complete</div><div className="meta">Review the rosters, then start the season.</div></div>
        <div className="row" style={{gap:8}}>
          <button className="btn ghost" onClick={undo}>↩ Undo last</button>
          <button className="btn ghost" onClick={restart}>Restart</button>
          <button className="btn" onClick={finish}>Start season →</button>
        </div>
      </div>
      <div className="dash">
        {players.map(p => (
          <div className="col" key={p}>
            <div className="col-head">{p}</div>
            {[["treasure","💎 Treasures"],["trash","🗑️ Trash"]].map(([type,title]) => (
              <React.Fragment key={type}>
                <div className={"sec-head "+type}>{title}</div>
                <table className="tt"><tbody>
                  {draft.picks.filter(x=>x.player===p&&x.type===type).map((x,i)=>(
                    <tr key={i}><td className="tm" style={{["--tc"]:COLORS[x.team]||"#666"}} title={x.team}>{TEAM_ABBREV[x.team]&&<img className="team-logo-sm" src={teamLogo(x.team)} alt=""/>}{x.team}</td></tr>
                  ))}
                </tbody></table>
              </React.Fragment>
            ))}
          </div>
        ))}
      </div>
    </div>
  );

  return (
    <div>
      <div className="pickbar">
        <div><div className="who">🟢 {current} on the clock</div><div className="meta">Round {round} of {ROUNDS} · Pick {pickIndex+1} of {totalPicks} · pick 💎 Treasure or 🗑️ Trash</div></div>
        <div className="row" style={{gap:8}}>
          <button className="btn ghost" onClick={undo} disabled={!draft.picks.length}>↩ Undo</button>
          <button className="btn ghost" onClick={restart}>Restart</button>
        </div>
      </div>
      <DraftRosterPreview picks={draft.picks} order={draft.order} current={current} />
      {["AFC","NFC"].map(conf => {
        const confDivs = DIVISIONS.filter(d=>d.conf===conf);
        if (!confDivs.some(d=>d.teams.some(t=>!taken.has(t)))) return null;
        return (
          <div className="conf-group" key={conf}>
            <div className="conf-header">{conf}</div>
            <div className="conf-div-grid">
              {confDivs.map(({div,teams}) => {
                const avail = teams.filter(t=>!taken.has(t)).sort((a,b)=>(teamData?.[a]?.rank??99)-(teamData?.[b]?.rank??99));
                return (
                  <div className="div-col" key={div}>
                    <div className="div-header">{div}</div>
                    {avail.map(t => {
                      const td=teamData?.[t];
                      return (
                        <div className="teamcard" key={t} style={{["--tc"]:COLORS[t]||"#666"}}>
                          <div className="teamcard-top">
                            <img className="team-logo" src={teamLogo(t)} alt="" />
                            <div className="team-info">
                              <span className="tnm" title={t}>{t}</span>
                              {td && <div className="team-stats">
                                <div className="stat-item"><span className="stat-label">Wins</span><span className="stat-val">{td.w}</span></div>
                                <div className="stat-item"><span className="stat-label">Losses</span><span className="stat-val">{td.l}</span></div>
                                <div className="stat-item"><span className="stat-label">PCT</span><span className="stat-val">{td.pct.toFixed(3).replace(/^0/,"")}</span></div>
                                <div className="stat-item"><span className="stat-label">Rank</span><span className="stat-val">#{td.rank}</span></div>
                              </div>}
                            </div>
                          </div>
                          <div className="teamcard-btns">
                            <button className="pickbtn t" disabled={counts[current]?.treasure>=PER_CAT} onClick={()=>pick(t,"treasure")}>💎 Treasure</button>
                            <button className="pickbtn tr" disabled={counts[current]?.trash>=PER_CAT} onClick={()=>pick(t,"trash")}>🗑️ Trash</button>
                          </div>
                        </div>
                      );
                    })}
                    {!avail.length && <div style={{color:"var(--line)",fontSize:11,textAlign:"center",padding:"8px 0"}}>all picked</div>}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>

</body>
